agents:
  zt-trigger:
    role: 定时触发器，拉取涨速排名前100股票
    docs: /root/agent-room/agents/zt-trigger
    data_dir: /srv/zt-trigger/data
    task_queue: /srv/agent-bus/tasks/trigger
    gateway_url: http://127.0.0.1:8642
    dashboard_url: http://127.0.0.1:9119
    cron_schedule: "*/10 9-14 * * 1-5"
    allowed_work:
      - 调用涨速排名API
      - 构建任务列表
      - 下发给zt-team-leader
    forbidden_work:
      - 自行分析股票
      - 直接联系子agent
      - 发送飞书通知

  zt-fundamental:
    role: 基本面分析师
    docs: /root/agent-room/agents/zt-fundamental
    data_dir: /srv/zt-fundamental/data
    task_queue: /srv/agent-bus/tasks/fundamental
    gateway_url: http://127.0.0.1:8641
    dashboard_url: http://127.0.0.1:9118
    weight: 1
    allowed_work:
      - 盈利业绩维度分析（净利润增速/扣非/EPS/毛利率）
      - 题材与事件催化维度分析（行业政策/重大订单/资产重组）
      - 财务健康维度分析（资产负债率/商誉/现金流）
      - 股东与筹码维度分析（机构增持/股东户数/解禁规模）
      - 估值性价比维度分析（PE/PB/行业分位）
      - 成长属性分析（研发投入/产能扩张）
      - 输出涨停潜力等级（高/中/低/无）+ 核心支撑逻辑 + 风险点
    forbidden_work:
      - 技术面分析
      - 情绪面分析
      - 资金面分析
      - 发送飞书通知
      - 直接交易

  zt-technician:
    role: 技术面分析师
    docs: /root/agent-room/agents/zt-technician
    data_dir: /srv/zt-technician/data
    task_queue: /srv/agent-bus/tasks/technician
    gateway_url: http://127.0.0.1:8643
    dashboard_url: http://127.0.0.1:9120
    weight: 1
    allowed_work:
      - 量能结构维度分析（成交量/量比/换手率/放量缩量节奏）
      - 趋势与均线维度分析（均线排列/趋势方向/高低点抬升）
      - 关键位置形态维度分析（平台突破/箱体突破/支撑压力位）
      - 筹码结构维度分析（筹码集中度/套牢盘/获利盘）
      - 资金与盘口维度分析（主力净流入/大单占比/分时强弱）
      - 输出涨停预测（是/否）+ 核心技术支撑逻辑 + 技术面风险点
    forbidden_work:
      - 基本面分析
      - 情绪面分析
      - 资金面分析
      - 发送飞书通知
      - 直接交易

  zt-fund-flow:
    role: 资金面分析师
    docs: /root/agent-room/agents/zt-fund-flow
    data_dir: /srv/zt-fund-flow/data
    task_queue: /srv/agent-bus/tasks/fund-flow
    gateway_url: http://127.0.0.1:8645
    dashboard_url: http://127.0.0.1:9122
    weight: 1
    allowed_work:
      - 主力大单资金维度分析（超大单/大单净流入/主力净占比）
      - 龙虎榜机构游资维度分析（机构净买入/知名游资介入）
      - 北向与公募资金维度分析（北向增减持/QFII/公募基金）
      - 分时盘口资金维度分析（分时资金曲线/日内承接/脉冲资金）
      - 筹码抛压资金维度分析（主力兑现排查/出逃识别/资金锁仓度）
      - 输出涨停预测（是/否）+ 核心利好资金逻辑 + 资金面风险隐患
    forbidden_work:
      - 基本面分析
      - 技术面分析
      - 情绪面分析
      - 发送飞书通知
      - 直接交易

  zt-sentiment:
    role: 市场情绪分析师
    docs: /root/agent-room/agents/zt-sentiment
    data_dir: /srv/zt-sentiment/data
    task_queue: /srv/agent-bus/tasks/sentiment
    gateway_url: http://127.0.0.1:8646
    dashboard_url: http://127.0.0.1:9123
    weight: 1
    allowed_work:
      - 大盘整体情绪维度分析（涨停家数/跌停家数/炸板率/赚钱效应）
      - 主线题材情绪维度分析（题材热度/发酵力度/延续性）
      - 板块梯队情绪维度分析（梯队完整度/龙头带动/跟风强度）
      - 个股人气资金情绪维度分析（连板高度/辨识度/游资关注度）
      - 舆情与资金风向维度分析（资讯热度/讨论量/炒作风向）
      - 输出涨停预测（是/否）+ 核心情绪支撑逻辑 + 情绪面风险点
    forbidden_work:
      - 基本面分析
      - 技术面分析
      - 资金面分析
      - 发送飞书通知
      - 直接交易

  zt-team-leader:
    role: 整合汇总Agent，不独立进行行情研判
    docs: /root/agent-room/agents/zt-team-leader
    data_dir: /srv/zt-team-leader/data
    task_queue: /srv/agent-bus/tasks/team-leader
    gateway_url: http://127.0.0.1:8650
    dashboard_url: http://127.0.0.1:9130
    review_cron: "0 16 * * 1-5"
    specialists:
      - zt-fundamental
      - zt-technician
      - zt-fund-flow
      - zt-sentiment
    allowed_work:
      - 接收子agent分析结果（中立公平原则）
      - 按权重加权计算涨停综合置信度（权重默认=1）
      - 按置信得分从高到低排名生成涨停预测信号表
      - 信号表字段：序号；股票名称；参与预测的agent；综合置信分
      - 风险合并（同类风险合并，多维同时提示=一级高危）
      - 16:00收盘复盘（非15:30）
      - 按预测准确率给子agent排名（鉴别力打分）
      - 生成复盘报告发送飞书
      - 多轮次预测去重计数
    forbidden_work:
      - 自行分析股票
      - 独立预判走势
      - 直接调用行情API
      - 私自调整权重比例
      - 直接交易

# Task flow:
#   zt-trigger (every 10min) 
#     -> zt-team-leader (dispatch)
#       -> zt-fundamental / zt-technician / zt-fund-flow / zt-sentiment (parallel)
#       -> zt-team-leader (aggregate + signal)
#         -> Feishu webhook
#
# Review flow (16:00 daily):
#   zt-team-leader (compare predictions vs actual)
#     -> score each specialist by discrimination power
#     -> generate review report
#     -> Feishu webhook
